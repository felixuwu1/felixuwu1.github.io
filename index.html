<!DOCTYPE html>
<html>

<head>
<title>Probabilidad y Estad챠stica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1 style="text-align:center;">Probabilidad y Estad챠stica</h1>

<p>Recibo de luz</p>

<input type="file" id="subirpdf" accept="application/pdf">

<div id="resultadoOCR"></div>

<hr>

<h2>Calculadora de Regresi처n Lineal</h2>

<p>Introduce los datos separados por coma</p>

X:<br>
<input id="xdata" placeholder="1,2,3,4"><br><br>

Y:<br>
<input id="ydata" placeholder="2,3,5,4"><br><br>

<button onclick="calcular()">Calcular</button>

<h3 id="resultadoRegresion"></h3>

<canvas id="grafica"></canvas>

<script>

let input = document.getElementById("subirpdf");
let resultadoOCR = document.getElementById("resultadoOCR");

input.addEventListener("change", function(event) {

let archivo = event.target.files[0];
let reader = new FileReader();

reader.onload = function() {

let typedarray = new Uint8Array(this.result);

pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {

pdf.getPage(1).then(function(page) {

let viewport = page.getViewport({ scale: 2 });
let canvas = document.createElement("canvas");
let context = canvas.getContext("2d");

canvas.height = viewport.height;
canvas.width = viewport.width;

let renderContext = {
canvasContext: context,
viewport: viewport
};

page.render(renderContext).promise.then(function() {

resultadoOCR.innerText = "Escaneando pdf...";

Tesseract.recognize(canvas,'spa')
.then(function(result){

let text = result.data.text;

let totalMatch = text.match(/Total\s*\$?\s*([\d\.]+)/i);
let total = totalMatch ? totalMatch[1] : "No encontrado";

let nombre = "No encontrado";

let lineas = text.split("\n");

for (let i = 0; i < lineas.length; i++) {

let linea = lineas[i].toUpperCase();

if (linea.includes("TOTAL") && linea.includes("PAGAR")) {

for (let j = i + 1; j <= i + 3 && j < lineas.length; j++) {

let posibleNombre = lineas[j].trim().toUpperCase();

if (
posibleNombre.length > 15 &&
/[A-Z횁횋횒횙횣횗]{5,}/.test(posibleNombre)
) {

nombre = posibleNombre.replace(/[^A-Z횁횋횒횙횣횗\s]/g,"").trim();
break;

}

}

break;

}

}

resultadoOCR.innerHTML = `
<h3>Datos detectados</h3>
<b>Nombre:</b> ${nombre} <br><br>
<b>Total a pagar:</b> $${total}
`;

});

});

});

});

};

reader.readAsArrayBuffer(archivo);

});



let grafica = null;



function calcular(){

let x = document.getElementById("xdata").value.split(",").map(Number)
let y = document.getElementById("ydata").value.split(",").map(Number)

let n = x.length

let sumx = 0
let sumy = 0
let sumxy = 0
let sumx2 = 0

for(let i=0;i<n;i++){

sumx += x[i]
sumy += y[i]
sumxy += x[i]*y[i]
sumx2 += x[i]*x[i]

}

let m = (n*sumxy - sumx*sumy)/(n*sumx2 - sumx*sumx)
let b = (sumy - m*sumx)/n

document.getElementById("resultadoRegresion").innerHTML =
"y = " + m.toFixed(4) + "x + " + b.toFixed(4)



let puntos = []

for(let i=0;i<n;i++){
puntos.push({x:x[i],y:y[i]})
}



let linea = []

let minx = Math.min(...x)
let maxx = Math.max(...x)

linea.push({x:minx,y:m*minx+b})
linea.push({x:maxx,y:m*maxx+b})



if(grafica){
grafica.destroy()
}



let ctx = document.getElementById("grafica").getContext("2d")

grafica = new Chart(ctx,{
type:'scatter',
data:{
datasets:[
{
label:'Datos',
data:puntos
},
{
label:'Recta de regresi처n',
type:'line',
data:linea,
fill:false
}
]
},
options:{
scales:{
x:{
type:'linear',
position:'bottom'
}
}
}
})

}

</script>

</body>
</html>
