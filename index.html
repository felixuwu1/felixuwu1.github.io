<!DOCTYPE html>
<html>
  <body>
<h1 style="text-align: center;"> Probabilidad y Estad챠stica </h1>
    <p> resibo de luz </p>
      <div>
    <input type = "file" id = "subirpdf" accept = "application/pdf">
      <div id="resultado"></div>
      </div>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script> 
     <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script>

let input = document.getElementById("subirpdf");
let resultado = document.getElementById("resultado");

input.addEventListener("change", function(event) {

    let archivo = event.target.files[0];
    let reader = new FileReader();

    reader.onload = function() {

        let typedarray = new Uint8Array(this.result);

        pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {

            pdf.getPage(1).then(function(page) {

                let viewport = page.getViewport({ scale: 2 });
                let canvas = document.createElement("canvas");
                let context = canvas.getContext("2d");

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                let renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };

                page.render(renderContext).promise.then(function() {

                    resultado.innerText = "Escaneando pdf";

                    Tesseract.recognize(canvas, 'spa')
                    .then(function(result) {

                        let text = result.data.text;
                        console.log("Texto OCR:", text);

                        let totalMatch = text.match(/Total\s*\$?\s*([\d\.]+)/i);
                        let total = totalMatch ? totalMatch[1] : "No encontrado";
                       let nombre = "No encontrado";
                        let lineas = text.split("\n");

                          for (let linea of lineas) {

                            let limpia = linea.trim().toUpperCase();

                                if (
                            limpia.length > 15 &&
                            /[A-Z횁횋횒횙횣횗]{5,}/.test(limpia) &&
                            !limpia.includes("TOTAL") &&
                              !limpia.includes("PAGAR") &&
                            !limpia.includes("CFE") &&
                            !limpia.includes("SERVICIO")
                                ) {

                            nombre = limpia.replace(/[^A-Z횁횋횒횙횣횗\s]/g, "").trim();
                              break;
                                }
                            }
                                      resultado.innerHTML = `
                                      <h3>Datos detectados:</h3>
                                      <b>Nombre:</b> ${nombre} <br><br>
                                      <b>Total a pagar:</b>
                                      $${total}
                          `;

                    });

                });

            });

        });

    };

    reader.readAsArrayBuffer(archivo);

});

</script>
  </body> 
 </html>
